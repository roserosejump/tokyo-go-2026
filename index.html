<style>
:root{
  --bg:#0a0910;--bg2:#0f0e1a;--bg3:#13112a;--bg4:#1a1830;
  --bd:#2a2540;--bd2:#3a3560;
  --text:#c8daf6;--t2:#88bbff;--t3: #6f90c0;--t4: #3b5080;
  --pink:#f4a8c8;--pink2:#e8789a;--blue:#9ec5f5;--amber:#f0dba0;
  --px:'DotGothic16',monospace;--mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--px);font-size:15px;display:flex;flex-direction:column}

/* TOPBAR */
#topbar{background:rgba(10,9,16,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:48px}
.tb-title{font-size:15px;color:var(--pink);letter-spacing:.08em}
.tb-r{font-size:12px;color:var(--t3);text-align:right;line-height:1.4;font-family:var(--mono);white-space:pre}
.tb-back{font-size:14px;color:var(--pink);cursor:pointer;letter-spacing:.04em;padding:2px 0}

/* SCROLL */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
#bnav{background:rgba(10,9,16,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bd);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;cursor:pointer;color:var(--t4);transition:color .15s}
.ni.active{color:var(--pink)}
.ni-icon{font-size:20px;line-height:1}
.ni-lb{font-size:11px;letter-spacing:.06em}

/* PAGES */
.page{display:none;padding-bottom:8px}
.page.active{display:block}

/* ── HOME ── */
.h-hero{padding:20px 16px 16px;border-bottom:1px solid var(--bd)}
.h-eye{font-size:11px;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.h-greet{font-size:24px;color:var(--text);line-height:1.2;margin-bottom:4px}
.h-greet em{color:var(--pink);font-style:normal}
.h-clock{font-family:var(--mono);font-size:36px;color:var(--text);letter-spacing:-.02em;}
.h-date{font-size:12px;color:var(--t3);margin-top:4px;font-family:var(--mono);margin-top:20px}

.today-btn{margin:16px;background:var(--bg3);border:1px solid var(--pink);border-radius:6px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.today-btn:active{background:var(--bg4)}
.tb-label{font-size:11px;color:var(--pink);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.tb-t{font-size:15px;color:var(--text)}
.tb-m{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--mono)}
.tb-arr{font-size:18px;color:var(--pink)}

.days-sec{padding:0 16px 32px}
.sec-lb{font-size:11px;color:var(--t4);letter-spacing:.15em;text-transform:uppercase;padding:16px 0 10px;font-family:var(--mono)}
.days-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dc{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.dc:active{transform:scale(.97)}
.dc.today{border-color:var(--pink);background:var(--bg3)}
.dc-n{font-size:10px;color:var(--t4);letter-spacing:.1em;margin-bottom:3px;font-family:var(--mono)}
.dc-d{font-size:14px;color:var(--text);margin-bottom:4px}
.dc.today .dc-d{color:var(--pink)}
.dc-c{font-size:11px;color:var(--t3);line-height:1.6}
.dc-cnt{font-size:10px;color:var(--t4);margin-top:6px;font-family:var(--mono)}

/* ── DAY ── */
.day-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--bd)}
.dh-lb{font-size:11px;color:var(--pink);letter-spacing:.15em;margin-bottom:3px;font-family:var(--mono)}
.dh-t{font-size:18px;color:var(--text);margin-bottom:4px}
.dh-h{font-size:12px;color:var(--t3)}
.items-wrap{padding:10px 12px 32px;display:flex;flex-direction:column;gap:6px}
.city-sep{font-size:10px;color:var(--pink);letter-spacing:.2em;padding:6px 2px 2px;opacity:.5;font-family:var(--mono)}

/* ITEM CARD */
.ic{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.ic-top{padding:9px 11px 8px;background:var(--bg3);cursor:pointer}
.ic-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ic-time{font-size:11px;color:var(--blue);letter-spacing:.06em;font-family:var(--mono)}
.ic-arr{font-size:13px;color:var(--t4);transition:transform .2s;line-height:1}
.ic-arr.open{transform:rotate(180deg);color:var(--pink)}
.ic-tr{display:flex;align-items:baseline;flex-wrap:wrap;gap:5px;margin-bottom:3px}
.ic-title{font-size:13px;color:var(--text);line-height:1.35}
.atag{display:inline-flex;background:var(--bg4);border:1px solid var(--bd2);border-radius:3px;padding:1px 5px;flex-shrink:0}
.atag span{font-size:9px;color:#a090c0;letter-spacing:.06em}
.ic-trs{font-size:11px;color:var(--t3)}
.bdg-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.bdg{font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.04em}
.bdg-r{background:#0d1e28;color:var(--blue);border:1px solid #1a3045}
.bdg-t{background:#0d1520;color:var(--blue);border:1px solid #1a2a40}

/* CARD BODY */
.ic-body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px}
.ic-body.hidden{display:none}
.blk{border-left:2px solid var(--pink);padding:4px 8px;background:#170f1e;border-radius:0 3px 3px 0}
.blk.bl{border-color:var(--blue);background:#0f1520}
.blk.pu{border-color:var(--blue);background:#0f1520}
.blk-lb{font-size:9px;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;font-family:var(--mono)}
.blk-vl{font-size:11px;color:var(--t2);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.rc{background:#0d1520;border:1px solid #1a3045;border-radius:4px;padding:5px 7px}
.rc-lb{font-size:9px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;font-family:var(--mono)}
.rc-vl{font-size:12px;color:var(--blue);letter-spacing:.04em}
.map-btn{display:flex;align-items:center;gap:6px;background:#1a0f24;border:1px solid var(--pink);border-radius:4px;padding:7px 10px;margin-top:2px;text-decoration:none;transition:background .15s}
.map-btn:active{background:#2a1f34}
.map-btn span{font-size:11px;color:var(--pink)}
.must-list{display:flex;flex-direction:column;gap:2px;margin-top:3px}
.mi{font-size:11px;color:var(--t2);line-height:1.6;padding-left:10px;position:relative}
.mi::before{content:'›';position:absolute;left:0;color:var(--pink)}
.task-list{display:flex;flex-direction:column}
.tr{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.tr:last-child{border-bottom:none}
.tcb{width:12px;height:12px;border:1px solid var(--bd2);border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tr.done .tcb{background:var(--pink);border-color:var(--pink)}
.tr.done .tcb::after{content:'✓';font-size:10px;color:#0a0910;font-weight:700}
.t-text{font-size:11px;color:var(--t2);line-height:1.5;flex:1}
.tr.done .t-text{text-decoration:line-through;color:var(--t4)}

/* ── CHECKLIST ── */
.chk-page{padding:12px 16px 32px}
.chk-sec{margin-bottom:20px}
.chk-sec-t{font-size:12px;color:var(--pink);letter-spacing:.12em;padding-bottom:8px;border-bottom:1px solid var(--bd);margin-bottom:8px;font-family:var(--mono)}
.cr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.cr:last-child{border-bottom:none}
.ccb{width:14px;height:14px;border:1px solid var(--bd2);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cr.done .ccb{background:var(--pink);border-color:var(--pink)}
.cr.done .ccb::after{content:'✓';font-size:11px;color:#0a0910;font-weight:700}
.cr-text{font-size:13px;color:var(--t2);line-height:1.5;flex:1}
.cr.done .cr-text{text-decoration:line-through;color:var(--t4)}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-inp{flex:1;background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;padding:8px 10px;color:var(--text);font-family:var(--px);font-size:13px;outline:none}
.add-inp::placeholder{color:var(--t4)}
.add-inp:focus{border-color:var(--pink)}
.add-btn{background:var(--bg3);border:1px solid var(--pink);border-radius:4px;padding:8px 12px;color:var(--pink);font-family:var(--px);font-size:13px;cursor:pointer;transition:background .15s}
.add-btn:active{background:var(--bg4)}

/* ── TOOLS ── */
.tools-page{padding:14px 16px 32px;display:flex;flex-direction:column;gap:16px}
.tool-card{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.tool-hdr{background:var(--bg3);padding:10px 14px;font-size:12px;color:var(--pink);letter-spacing:.12em;font-family:var(--mono)}
.w-inner{padding:12px 14px}
.wcity-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.wct{background:var(--bg4);border:1px solid var(--bd);border-radius:4px;padding:4px 10px;font-size:11px;color:var(--t3);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.wct.active{background:#1a0f24;border-color:var(--pink);color:var(--pink)}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wc{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:10px 12px;text-align:center}
.wc-day{font-size:10px;color:var(--t3);margin-bottom:4px;font-family:var(--mono)}
.wc-icon{font-size:24px;margin:4px 0}
.wc-temp{font-size:14px;color:var(--text);font-family:var(--mono)}
.wc-desc{font-size:10px;color:var(--t3);margin-top:3px}
.w-msg{font-size:12px;color:var(--t3);text-align:center;padding:20px 0;font-family:var(--mono)}
.fx-inner{padding:12px 14px}
.fx-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fx-lb{font-size:11px;color:var(--t3);font-family:var(--mono);min-width:32px}
.fx-inp{flex:1;background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:16px;outline:none;text-align:right}
.fx-inp:focus{border-color:var(--pink)}
.fx-arr{font-size:11px;color:var(--t3);text-align:center;padding:2px 0}
.fx-rate{font-size:11px;color:var(--t4);text-align:center;font-family:var(--mono);margin-top:4px}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.qc{background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:8px;cursor:pointer;transition:border-color .15s;text-align:center}
.qc:active{border-color:var(--pink)}
.qc-j{font-size:13px;color:var(--t2);font-family:var(--mono)}
.qc-t{font-size:13px;color:var(--pink);font-family:var(--mono);margin-top:2px}

@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.dl span{animation:blink 1.2s ease-in-out infinite}
.dl span:nth-child(2){animation-delay:.2s}
.dl span:nth-child(3){animation-delay:.4s}
</style>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

</div>

          <div class="fx-arr">↕</div>
          <div class="fx-row" style="margin-top:6px"><div class="fx-lb">TWD $</div><input class="fx-inp" id="fx-t" type="number" placeholder="0" oninput="calcFx('t')"></div>

          <div class="qg" id="qg"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="bnav">

</div>

    {id:'8-1',time:'',icon:'🧳',title:'退房 & 前往機場',area:'上野',trs:'🚇 成田特快 NEX 或 利木津巴士',desc:'確認班機時間，預留充足交通時間\n⚠️ 建議出發前3小時抵達機場'},
    {id:'8-2',time:'',icon:'✈️',title:'NRT → TPE｜返回台灣',area:'成田機場',desc:'一路順風！\n帶著滿滿的回憶與戰利品回家 🗼\n\n旅程結束，期待下次再見日本！'},
  ]},
];

const GTASKS={
  '行前購票':[{id:'g1',text:'購買/劃位 N\'EX（機場→東京）5/24'},{id:'g2',text:'購買/劃位 新幹線（東京→熱海）5/24'},{id:'g3',text:'領取 富士回遊號預訂票 ID: E79730'}],
  '已確認訂位':[{id:'g4',text:'✅ 牛鍋右近 5/25 17:30 — ID: RV2WCU'},{id:'g5',text:'✅ 富士回遊48號 5/27 17:41 — 3車14番CD'},{id:'g6',text:'✅ 六本木展望台 5/28 — Klook已購票'},{id:'g7',text:'✅ 權八 西麻布 5/28 19:45'},{id:'g8',text:'✅ YORONIKU 惠比壽 5/29 17:00 — ID: E4ZV7T'},{id:'g9',text:'✅ MEAT MAN Roppongi 5/29 22:00 — ID: 6X9KQS'}],
  '行李清單':[{id:'g10',text:'護照 + 相關文件'},{id:'g11',text:'Suica卡 / 現金日圓'},{id:'g12',text:'網路SIM卡 / eSIM'},{id:'g13',text:'充電器、行動電源'},{id:'g14',text:'藥品（感冒、腸胃、止痛）'},{id:'g15',text:'雨傘 / 折疊傘'}],
};
const SHOP_KEY='jp-shop';
const SHOP_DEF=[{id:'s1',text:'箱根饅頭'},{id:'s2',text:'箱根神社御守'},{id:'s3',text:'富士山限定零食'},{id:'s4',text:'治一郎布丁'},{id:'s5',text:'東京限定零食'},{id:'s6',text:'清酒'}];

// ── STATE ─────────────────────────────────────────────────────────────────────
let curPage='home',curDay=null;
const expanded=new Set();
const FXR=0.218;

function store(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch(e){return d}}
function getTasks(){return load('jp-tasks',{})}
function setTask(id,v){const t=getTasks();t[id]=v;store('jp-tasks',t)}
function getShop(){return load(SHOP_KEY,SHOP_DEF.map(i=>({...i,done:false})))}
function saveShop(l){store(SHOP_KEY,l)}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function jst(){
  try{return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}))}
  catch(e){const n=new Date();return new Date(n.getTime()+9*3600000);}
}
function tripDay(){const n=jst(),s=new Date(2026,4,24),d=Math.floor((n-s)/86400000);return(d>=0&&d<8)?d+1:null}
function tick(){
  const n=jst(),hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0');
  const ce=document.getElementById('h-clk');if(ce)ce.textContent=hh+':'+mm;
  const de=document.getElementById('h-dt');
  if(de){const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];de.textContent=n.getFullYear()+'.'+(n.getMonth()+1)+'.'+n.getDate()+' '+D[n.getDay()]+' JST';}
  const r=document.getElementById('tbr');if(r&&curPage==='home')r.textContent=hh+':'+mm+'\nJST';
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function goPg(name){
  curPage=name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('scroll').scrollTop=0;
  const map={home:'pg-home',day:'pg-day',chk:'pg-chk',tools:'pg-tools'};
  document.getElementById(map[name]).classList.add('active');
  const nim={home:'ni-home',day:'ni-home',chk:'ni-chk',tools:'ni-tools'};
  document.getElementById(nim[name]).classList.add('active');
  const tl=document.getElementById('tbl'),tt=document.getElementById('tbt'),tr=document.getElementById('tbr');
  if(name==='home'){tl.innerHTML='';tt.textContent='🗼 TOKYO 2026';tr.textContent='';tick();renderHome();}
  else if(name==='day'){const d=DAYS[curDay-1];tl.innerHTML='<div class="tb-back" onclick="goPg(\'home\')">‹ 返回</div>';tt.textContent='DAY '+d.day+' · '+d.date;tr.textContent='';renderDay();}
  else if(name==='chk'){tl.innerHTML='';tt.textContent='待辦清單';tr.textContent='';renderChk();}
  else if(name==='tools'){tl.innerHTML='';tt.textContent='工具';tr.textContent='';renderQFx();fetchRate();loadWx('Tokyo');}
}
function openDay(n){curDay=n;goPg('day');}

// ── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const td=tripDay();
  const eye=document.getElementById('h-eye');
  if(td){const d=DAYS[td-1];eye.textContent='> DAY '+td+' · '+d.cities.join(' → ');
    document.getElementById('today-wrap').innerHTML=`<div class="today-btn" onclick="openDay(${td})"><div><div class="tb-label">> TODAY</div><div class="tb-t">${d.date} ${d.wd} · ${d.cities.join(' → ')}</div><div class="tb-m">${d.items.length} 個行程項目</div></div><div class="tb-arr">›</div></div>`;
  } else {eye.textContent='> 2026.05.24 – 05.31';document.getElementById('today-wrap').innerHTML='';}
  document.getElementById('days-grid').innerHTML=DAYS.map(d=>`<div class="dc${td===d.day?' today':''}" onclick="openDay(${d.day})"><div class="dc-n">DAY ${d.day}</div><div class="dc-d">${d.date} ${d.wd}</div><div class="dc-c">${d.cities.join('\n')}</div><div class="dc-cnt">${d.items.length} items</div></div>`).join('');
}

// ── DAY ───────────────────────────────────────────────────────────────────────
function renderDay(){
  const d=DAYS[curDay-1];
  document.getElementById('day-hdr').innerHTML=`<div class="dh-lb">> DAY ${d.day} · ${d.date} ${d.wd}</div><div class="dh-t">${d.cities.join(' → ')}</div><div class="dh-h">🏨 ${d.hotel}</div>`;
  const tasks=getTasks();
  let html='',lastArea='';
  d.items.forEach((item,i)=>{
    const isOpen=expanded.has(item.id);
    const hasBody=!!(item.desc||item.mustEat||item.tasks||item.reservation||item.mapUrl);
    if(item.area&&item.area!==lastArea){html+=`<div class="city-sep">> ${item.area}</div>`;lastArea=item.area;}
    let badges='';
    if(item.isReserved)badges+=`<span class="bdg bdg-r">✓ 已訂位</span>`;
    if(item.isTicket)badges+=`<span class="bdg bdg-t">🎫 已購票</span>`;
    let body='';
    if(item.trs&&item.trs.length>30)body+=`<div class="blk bl"><div class="blk-lb">交通</div><div class="blk-vl">${X(item.trs)}</div></div>`;
    if(item.desc)body+=`<div class="blk"><div class="blk-lb">說明</div><div class="blk-vl">${X(item.desc)}</div></div>`;
    if(item.mustEat&&item.mustEat.length)body+=`<div class="blk"><div class="blk-lb">必吃推薦</div><div class="must-list" style="margin-top:4px">${item.mustEat.map(m=>`<div class="mi">${X(m)}</div>`).join('')}</div></div>`;
    if(item.reservation){const r=item.reservation;body+=`<div class="blk bl"><div class="blk-lb">訂位資訊</div><div class="rg"><div class="rc"><div class="rc-lb">ID</div><div class="rc-vl">${X(r.id)}</div></div>${r.time?`<div class="rc"><div class="rc-lb">時間</div><div class="rc-vl">${X(r.time)}</div></div>`:''} ${r.menu?`<div class="rc" style="grid-column:1/-1"><div class="rc-lb">內容</div><div class="rc-vl">${X(r.menu)}</div></div>`:''}</div></div>`;}
    if(item.tasks&&item.tasks.length){const tRows=item.tasks.map(t=>{const tid=item.id+'-'+btoa(encodeURIComponent(t)).slice(0,8);const dn=tasks[tid]?'done':'';return`<div class="tr ${dn}" onclick="togTask('${tid}',this)"><div class="tcb"></div><div class="t-text">${X(t)}</div></div>`;}).join('');body+=`<div class="blk"><div class="blk-lb">任務</div><div class="task-list">${tRows}</div></div>`;}
    if(item.mapUrl)body+=`<a class="map-btn" href="${item.mapUrl}" target="_blank"><span>📍 Google Maps 導航</span></a>`;
    html+=`<div class="ic" id="ic-${item.id}" style="animation-delay:${Math.min(i*.04,.3)}s"><div class="ic-top" onclick="togCard('${item.id}',${hasBody})"><div class="ic-r1"><div class="ic-time">${item.time||''}</div>${hasBody?`<div class="ic-arr${isOpen?' open':''}" id="arr-${item.id}">▼</div>`:''}</div><div class="ic-tr"><span class="ic-title">${item.icon} ${item.title}</span>${item.area?`<div class="atag"><span>${item.area}</span></div>`:''}</div>${item.trs&&item.trs.length<=30?`<div class="ic-trs">${X(item.trs)}</div>`:''} ${badges?`<div class="bdg-row">${badges}</div>`:''}</div>${hasBody?`<div class="ic-body${isOpen?'':' hidden'}" id="ib-${item.id}">${body}</div>`:''}</div>`;
  });
  document.getElementById('items-wrap').innerHTML=html;
}
function togCard(id,has){if(!has)return;const b=document.getElementById('ib-'+id),a=document.getElementById('arr-'+id);if(!b)return;const h=b.classList.contains('hidden');b.classList.toggle('hidden',!h);if(a)a.classList.toggle('open',h);if(h)expanded.add(id);else expanded.delete(id);}
function togTask(tid,el){const t=getTasks(),nv=!t[tid];setTask(tid,nv);el.classList.toggle('done',nv);}

// ── CHECKLIST ─────────────────────────────────────────────────────────────────
function renderChk(){
  const tasks=getTasks();let html='';
  Object.entries(GTASKS).forEach(([cat,items])=>{
    html+=`<div class="chk-sec"><div class="chk-sec-t">> ${cat}</div>`;
    items.forEach(item=>{const dn=tasks[item.id]?'done':'';html+=`<div class="cr ${dn}" onclick="togChk('${item.id}',this)"><div class="ccb"></div><div class="cr-text">${X(item.text)}</div></div>`;});
    html+='</div>';
  });
  const shop=getShop();
  html+=`<div class="chk-sec"><div class="chk-sec-t">> 購物清單</div>`;
  shop.forEach((item,i)=>{html+=`<div class="cr ${item.done?'done':''}" onclick="togShop(${i},this)"><div class="ccb"></div><div class="cr-text">${X(item.text)}</div></div>`;});
  html+=`<div class="add-row"><input class="add-inp" id="si" placeholder="新增購物項目..." onkeydown="if(event.key==='Enter')addShop()"><div class="add-btn" onclick="addShop()">＋</div></div></div>`;
  document.getElementById('chk-page').innerHTML=html;
}
function togChk(id,el){const t=getTasks(),nv=!t[id];setTask(id,nv);el.classList.toggle('done',nv);}
function togShop(i,el){const l=getShop();l[i].done=!l[i].done;saveShop(l);el.classList.toggle('done',l[i].done);}
function addShop(){const inp=document.getElementById('si'),txt=(inp.value||'').trim();if(!txt)return;const l=getShop();l.push({id:'u'+Date.now(),text:txt,done:false});saveShop(l);inp.value='';renderChk();}

// ── FX ────────────────────────────────────────────────────────────────────────
let liveRate=FXR,rateLoaded=false;

async function fetchRate(){
  const rateEl=document.getElementById('fx-rate');
  if(rateEl)rateEl.textContent='匯率抓取中...';
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=JPY&to=TWD');
    const data=await r.json();
    const rate=data.rates&&data.rates.TWD;
    if(rate&&rate>0){
      liveRate=rate;rateLoaded=true;
      if(rateEl)rateEl.textContent=`1 JPY = ${rate.toFixed(4)} TWD（${data.date} 即時匯率）`;
      renderQFx();
    }
  }catch(e){
    if(rateEl)rateEl.textContent='1 JPY ≈ 0.218 TWD（參考匯率，無法取得即時）';
  }
}
function calcFx(f){const j=document.getElementById('fx-j'),t=document.getElementById('fx-t');if(f==='j'){const v=parseFloat(j.value)||0;t.value=v?Math.round(v*liveRate):'';}else{const v=parseFloat(t.value)||0;j.value=v?Math.round(v/liveRate):'';}}
function renderQFx(){document.getElementById('qg').innerHTML=[500,1000,3000,5000,10000,30000].map(a=>`<div class="qc" onclick="setFx(${a})"><div class="qc-j">¥${a.toLocaleString()}</div><div class="qc-t">NT$ ${Math.round(a*liveRate).toLocaleString()}</div></div>`).join('');}
function setFx(j){document.getElementById('fx-j').value=j;document.getElementById('fx-t').value=Math.round(j*liveRate);}

// ── WEATHER ───────────────────────────────────────────────────────────────────
const CITIES={Tokyo:{lat:35.6762,lon:139.6503,label:'東京'},Atami:{lat:35.0964,lon:139.0709,label:'熱海'},Hakone:{lat:35.2329,lon:139.1069,label:'箱根'},Kawaguchiko:{lat:35.5113,lon:138.7470,label:'河口湖'}};
const WMO_ICON={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',80:'🌦',81:'🌧',95:'⛈'};
const WMO_DESC={0:'晴天',1:'大致晴',2:'多雲',3:'陰天',45:'霧',51:'小雨',61:'下雨',71:'下雪',80:'陣雨',95:'雷雨'};
const wxCache={};
function selCity(c){
  document.querySelectorAll('.wct').forEach(t=>t.classList.toggle('active',t.textContent===CITIES[c].label));
  loadWx(c);
}
async function loadWx(city){
  const el=document.getElementById('w-disp');if(!el)return;
  if(wxCache[city]){renderWx(wxCache[city]);return;}
  el.innerHTML='<div class="w-msg dl"><span>.</span><span>.</span><span>.</span></div>';
  try{
    const {lat,lon}=CITIES[city];
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia/Tokyo&forecast_days=7`);
    const data=await r.json();wxCache[city]=data;renderWx(data);
  }catch(e){el.innerHTML='<div class="w-msg">天氣資料載入失敗<br>請確認網路連線</div>';}
}
function renderWx(data){
  const el=document.getElementById('w-disp');if(!el)return;
  const{daily}=data;
  const dates=['5/24','5/25','5/26','5/27','5/28','5/29','5/30','5/31'];
  const wdays=['週日','週一','週二','週三','週四','週五','週六'];
  let html='<div class="w-grid">';
  for(let i=0;i<Math.min(7,daily.time.length);i++){
    const code=daily.weathercode[i],icon=WMO_ICON[code]||WMO_ICON[Math.floor(code/10)*10]||'🌡';
    const desc=WMO_DESC[code]||WMO_DESC[Math.floor(code/10)*10]||'—';
    const max=Math.round(daily.temperature_2m_max[i]),min=Math.round(daily.temperature_2m_min[i]);
    const d=new Date(daily.time[i]);
    html+=`<div class="wc"><div class="wc-day">${dates[i]} ${wdays[d.getDay()]}</div><div class="wc-icon">${icon}</div><div class="wc-temp">${max}° / ${min}°</div><div class="wc-desc">${desc}</div></div>`;
  }
  el.innerHTML=html+'</div>';
}

// ── UTIL ─────────────────────────────────────────────────────────────────────
function X(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded",function(){tick();setInterval(tick,15000);renderHome();});
</script>
